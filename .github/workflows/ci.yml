name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run validate:package-metadata
      - run: npm run validate:mcp-descriptors
      - run: npm run docs:tools
      - run: git diff --exit-code docs/TOOLS.md
      - run: npm run validate:manifest
      - run: npm pack --dry-run
      - run: npm ls @modelcontextprotocol/sdk undici express path-to-regexp
      - run: npm test
      - name: Secret scan
        run: |
          GITLEAKS_VERSION="8.24.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
          gitleaks detect --source . --no-banner --redact
      - name: Dependency audit (prod gate)
        run: npm audit --omit=dev --audit-level=moderate
      - name: Dependency audit (dev-only report)
        if: always()
        run: npm audit --include=dev --audit-level=high --json > audit-dev-report.json || true
      - name: Upload dev audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-dev-report
          path: audit-dev-report.json
          if-no-files-found: error
